<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SalesAI CRM - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#004ac6",
                    "on-error": "#ffffff",
                    "surface-tint": "#0053db",
                    "on-secondary-container": "#00714d",
                    "tertiary-container": "#996100",
                    "surface-container-highest": "#d3e4fe",
                    "outline-variant": "#c3c6d7",
                    "tertiary-fixed-dim": "#ffb95f",
                    "surface-bright": "#f8f9ff",
                    "surface-variant": "#d3e4fe",
                    "surface-container-low": "#eff4ff",
                    "inverse-on-surface": "#eaf1ff",
                    "on-error-container": "#93000a",
                    "on-surface": "#0b1c30",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#003ea8",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#002113",
                    "on-secondary": "#ffffff",
                    "on-surface-variant": "#434655",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#dce9ff",
                    "on-tertiary-fixed": "#2a1700",
                    "on-tertiary-container": "#ffeedd",
                    "background": "#f8f9ff",
                    "on-secondary-fixed-variant": "#005236",
                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-background": "#0b1c30",
                    "on-primary-container": "#eeefff",
                    "inverse-primary": "#b4c5ff",
                    "surface": "#f8f9ff",
                    "tertiary": "#784b00",
                    "secondary": "#006c49",
                    "secondary-fixed-dim": "#4edea3",
                    "primary-container": "#2563eb",
                    "surface-container": "#e5eeff",
                    "secondary-container": "#6cf8bb",
                    "on-tertiary-fixed-variant": "#653e00",
                    "secondary-fixed": "#6ffbbe",
                    "primary-fixed": "#dbe1ff",
                    "outline": "#737686",
                    "on-primary-fixed": "#00174b",
                    "inverse-surface": "#213145",
                    "tertiary-fixed": "#ffddb8",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-dim": "#cbdbf5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-margin": "24px",
                    "base": "4px",
                    "md": "16px",
                    "xl": "32px",
                    "lg": "24px",
                    "gutter": "16px",
                    "xs": "4px",
                    "sm": "8px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "headline-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "display-lg-mobile": ["Inter"],
                    "body-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-sm": ["Inter"],
                    "display-lg": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                    "display-lg-mobile": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-sm": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                    "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                    "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "display-lg": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9ff;
        }
        .login-card {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex flex-col items-center justify-center p-md">
<!-- Main Container -->
<main class="w-full max-w-[400px] flex flex-col gap-xl py-xl">
<!-- Header: Logo and Brand Message -->
<header class="flex flex-col items-center text-center gap-sm">
<div class="w-16 h-16 bg-on-surface rounded-xl flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-surface-container-lowest !text-[40px]" data-icon="business_center">business_center</span>
</div>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-on-surface">SalesAI</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
                Accelerate your pipeline with enterprise-grade intelligence.
            </p>
</header>
<!-- Middle: Login Form -->
<section class="login-card bg-surface-container-lowest p-lg rounded-xl border border-outline-variant flex flex-col gap-lg">
<form class="flex flex-col gap-md" id="loginForm" onsubmit="event.preventDefault()">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<input class="w-full p-sm rounded-lg border border-outline-variant bg-surface-bright font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full p-sm rounded-lg border border-outline-variant bg-surface-bright font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline" type="button">
<span class="material-symbols-outlined !text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-sm mt-xs">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-on-surface-variant" for="remember">Stay signed in for 30 days</label>
</div>
<button class="w-full bg-primary text-on-primary py-sm rounded-lg font-headline-sm text-headline-sm hover:bg-on-primary-fixed-variant transition-colors active:scale-[0.98] mt-sm" type="submit">
                    Sign In
                </button>
</form>
</section>
<!-- Bottom: Social Login & Action -->
<footer class="flex flex-col gap-lg items-center">
<div class="flex items-center w-full gap-md">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Or continue with</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-md w-full">
<button class="flex items-center justify-center gap-sm p-sm rounded-lg border border-outline-variant bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="google">google</span>
                    Google
                </button>
<button class="flex items-center justify-center gap-sm p-sm rounded-lg border border-outline-variant bg-surface-container-lowest font-label-md text-label-md text-on-surface hover:bg-surface-container-low transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
                    SSO
                </button>
</div>
<div class="text-center mt-md">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New to SalesAI? 
                    <a class="font-body-md text-body-md text-primary font-semibold hover:underline decoration-2 underline-offset-4 ml-xs" href="#">Start Trial</a>
</p>
</div>
<div class="mt-xl opacity-40">
<div class="w-32 h-32 blur-3xl bg-primary-container absolute -bottom-16 -left-16 rounded-full -z-10"></div>
<div class="w-32 h-32 blur-3xl bg-secondary-container absolute -top-16 -right-16 rounded-full -z-10"></div>
</div>
</footer>
</main>
<!-- Background Illustration (Minimalist subtle geometric patterns) -->
<div class="fixed inset-0 pointer-events-none -z-20 opacity-[0.03]">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<defs>
<pattern height="40" id="grid" patternunits="userSpaceOnUse" width="40">
<path d="M 40 0 L 0 0 0 40" fill="none" stroke="#004ac6" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid)" height="100%" width="100%"></rect>
</svg>
</div>
<script>
        // Micro-interactions
        const loginForm = document.getElementById('loginForm');
        const submitBtn = loginForm.querySelector('button[type="submit"]');

        loginForm.addEventListener('submit', () => {
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            submitBtn.disabled = true;
            
            // Simulate navigation delay
            setTimeout(() => {
                submitBtn.innerHTML = 'Sign In';
                submitBtn.disabled = false;
                alert('Success: Entering SalesAI Dashboard...');
            }, 1200);
        });

        // Password visibility toggle
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
            togglePass.querySelector('span').innerText = type === 'password' ? 'visibility' : 'visibility_off';
        });
    </script>
</body></html>
