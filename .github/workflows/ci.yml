name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint --if-present

      - name: TypeScript Compile Checks (tsc --noEmit)
        run: |
          for dir in services/* apps/* packages/*; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Typechecking $dir..."
              npx tsc --noEmit -p "$dir/tsconfig.json"
            fi
          done

  python-checks:
    name: Python Lint & Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          for dir in ai-workers/*; do
            if [ -f "$dir/requirements.txt" ]; then
              echo "Installing requirements for $dir..."
              pip install -r "$dir/requirements.txt"
            fi
          done

      - name: Lint Python Files (flake8)
        run: |
          pip install flake8
          flake8 ai-workers/ --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        run: npx jest --passWithNoTests || npx turbo run test --if-present

  build-docker:
    name: Verify Docker Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, python-checks, test]
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            file: ./services/api-gateway/Dockerfile
            context: .
          - name: lead-service
            file: ./services/lead-service/Dockerfile
            context: .
          - name: pipeline-service
            file: ./services/pipeline-service/Dockerfile
            context: .
          - name: followup-service
            file: ./services/followup-service/Dockerfile
            context: .
          - name: campaign-service
            file: ./services/campaign-service/Dockerfile
            context: .
          - name: user-service
            file: ./services/user-service/Dockerfile
            context: .
          - name: call-service
            file: ./services/call-service/Dockerfile
            context: .
          - name: notification-service
            file: ./services/notification-service/Dockerfile
            context: .
          - name: analytics-service
            file: ./services/analytics-service/Dockerfile
            context: .
          - name: ai-scoring
            file: ./ai-workers/scoring/Dockerfile
            context: ./ai-workers/scoring
          - name: ai-email-gen
            file: ./ai-workers/email-gen/Dockerfile
            context: ./ai-workers/email-gen
          - name: ai-assistant
            file: ./ai-workers/assistant/Dockerfile
            context: ./ai-workers/assistant
          - name: web
            file: ./apps/web/Dockerfile
            context: .
          - name: admin
            file: ./apps/admin/Dockerfile
            context: .
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.file }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
