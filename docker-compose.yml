      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: crm-web
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - crm-public
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: .
      dockerfile: ./apps/admin/Dockerfile
    container_name: crm-admin
    env_file:
      - .env
    ports:
      - "3002:3000"
    restart: unless-stopped
    networks:
      - crm-public
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data:
  model-artifacts:

networks:
  crm-internal:
    driver: bridge
  crm-public:
    driver: bridge
